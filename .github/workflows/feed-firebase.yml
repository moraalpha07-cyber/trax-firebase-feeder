name: Feed Firebase Every 5 Seconds

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run feeder
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GRAFANA_SESSION_ID: ${{ secrets.GRAFANA_SESSION_ID }}
        run: npm start
