name: Feed Firebase Every 5 Seconds

on:
  schedule:
    - cron: '* * * * *'   # GitHub Actions minimum = 1 min, script ඇතුළේ 5sec loop කරනවා
  workflow_dispatch:        # Manual trigger

jobs:
  feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run feeder
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          GRAFANA_SESSION_ID: ${{ secrets.GRAFANA_SESSION_ID }}
        run: npm start
